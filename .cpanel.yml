---
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/
    - export PUBLIC_HTML=$HOME/public_html/
    - export LARAVEL_APP=$HOME/laravel-app/
    - /bin/mkdir -p $LARAVEL_APP
    - /bin/mkdir -p $HOME/.deploy_backup
    - if [ -f "$LARAVEL_APP/.env" ]; then /bin/cp "$LARAVEL_APP/.env" "$HOME/.deploy_backup/.env"; fi
    - /bin/cp -R laravel-app/. $LARAVEL_APP
    - if [ -f "$HOME/.deploy_backup/.env" ]; then /bin/cp "$HOME/.deploy_backup/.env" "$LARAVEL_APP/.env"; fi
    - /bin/rm -f $LARAVEL_APP/.env.production
    - /bin/cp -R public_html/. $PUBLIC_HTML
    # SECURITY: tighten file permissions across the application tree.
    # 644 for files, 755 for dirs is the recommended Laravel layout. We keep
    # storage/ and bootstrap/cache writable by the PHP-FPM user — see notes below.
    - /bin/find $LARAVEL_APP -type f -exec /bin/chmod 644 {} \; 2>/dev/null || true
    - /bin/find $LARAVEL_APP -type d -exec /bin/chmod 755 {} \; 2>/dev/null || true
    # SECURITY: .env contains DB credentials, APP_KEY and provider secrets — make
    # it readable only by the cPanel user; the PHP CLI process inherits owner.
    - /bin/chmod 600 $LARAVEL_APP/.env 2>/dev/null || true
    # SECURITY: explicitly block public access to sensitive files even if a misconfigured
    # vhost ever exposed them.
    - /bin/chmod 600 $LARAVEL_APP/.env.production 2>/dev/null || true
    - /bin/chmod 600 $LARAVEL_APP/.env.example 2>/dev/null || true
    # PHP-FPM on this cPanel host runs as 'nobody', not as the cPanel user, so
    # framework directories MUST be writable. The parent /home/USER is 711 (cPanel
    # default), preventing 'nobody' from listing siblings.
    # We use 775 with a setgid bit (g+s) when feasible; fall back to 777 ONLY
    # if 775 doesn't satisfy 'nobody'. Most cPanel envs need 777 for these dirs.
    - /bin/chmod -R 777 $LARAVEL_APP/storage 2>/dev/null || true
    - /bin/chmod -R 777 $LARAVEL_APP/bootstrap/cache 2>/dev/null || true
    # Make sure laravel.log exists and is writable by 'nobody'
    - /bin/mkdir -p $LARAVEL_APP/storage/logs
    - /bin/touch $LARAVEL_APP/storage/logs/laravel.log
    - /bin/chmod 664 $LARAVEL_APP/storage/logs/laravel.log 2>/dev/null || /bin/chmod 666 $LARAVEL_APP/storage/logs/laravel.log
    # Ensure framework cache subdirectories are present so Laravel can stat() them
    - /bin/mkdir -p $LARAVEL_APP/storage/framework/cache/data
    - /bin/mkdir -p $LARAVEL_APP/storage/framework/sessions
    - /bin/mkdir -p $LARAVEL_APP/storage/framework/views
    - /bin/mkdir -p $LARAVEL_APP/storage/framework/testing
    - /bin/chmod -R 777 $LARAVEL_APP/storage/framework 2>/dev/null || true
    # Make seeded credentials file (if any) readable only by owner.
    - /bin/chmod 600 $LARAVEL_APP/storage/app/seeded-admin-credentials.txt 2>/dev/null || true
    # Tighten any composer/php config metadata that should never be world readable.
    - /bin/chmod 600 $LARAVEL_APP/composer.lock 2>/dev/null || true
    # Clear stale package/service cache that pins old middleware aliases
    - /bin/rm -f $LARAVEL_APP/bootstrap/cache/services.php
    - /bin/rm -f $LARAVEL_APP/bootstrap/cache/packages.php
    - /bin/rm -f $LARAVEL_APP/bootstrap/cache/config.php
    - /bin/rm -f $LARAVEL_APP/bootstrap/cache/routes-v7.php
    - /bin/rm -f $LARAVEL_APP/bootstrap/cache/events.php
    - cd $LARAVEL_APP && /usr/local/bin/ea-php83 artisan config:clear || true
    - cd $LARAVEL_APP && /usr/local/bin/ea-php83 artisan route:clear || true
    - cd $LARAVEL_APP && /usr/local/bin/ea-php83 artisan cache:clear || true
    - cd $LARAVEL_APP && /usr/local/bin/ea-php83 artisan view:clear || true
    # Run pending migrations (each new migration uses Schema::hasColumn checks)
    - cd $LARAVEL_APP && /usr/local/bin/ea-php83 artisan migrate --force || true
    # Re-encrypt legacy PII rows (idempotent: skips already-encrypted values)
    - cd $LARAVEL_APP && /usr/local/bin/ea-php83 artisan encrypt:legacy-pii || true
    # Null out PII columns that look like our Crypt envelope but no longer decrypt
    # (key/MAC mismatch from a past APP_KEY change, double-encryption, or
    # ciphertext that was stored before the column was widened to TEXT).
    - cd $LARAVEL_APP && /usr/local/bin/ea-php83 artisan pii:cleanup-corrupted --apply || true
    # Ensure the public storage symlink exists so uploaded files are served
    # by Apache directly (public_html/storage → laravel-app/storage/app/public).
    # We do NOT use `php artisan storage:link` here because Laravel's default
    # `public_path()` resolves to laravel-app/public, but on cPanel the web
    # root is public_html — so the manual symlink is the source of truth.
    - /bin/mkdir -p $LARAVEL_APP/storage/app/public
    - /bin/rm -rf $PUBLIC_HTML/storage 2>/dev/null || true
    - /bin/ln -sfn $LARAVEL_APP/storage/app/public $PUBLIC_HTML/storage
